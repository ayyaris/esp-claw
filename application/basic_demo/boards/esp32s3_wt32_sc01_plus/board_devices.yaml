version: 1.0.0
# Devices Configuration for ESP32-S3 WT32-SC01 Plus

devices:
  # LCD Display (ST7796UI, 480x320, 8-bit parallel I80)
  - name: display_lcd
    chip: st7796
    type: display_lcd
    sub_type: i80
    version: default
    dependencies:
      espressif/esp_lcd_st7796: "^1.3.0"
    config:
      x_max: 480
      y_max: 320
      invert_color: true
      need_reset: false                          # reset handled manually in setup_device.c
      rgb_ele_order: LCD_RGB_ELEMENT_ORDER_RGB
      data_endian: LCD_RGB_DATA_ENDIAN_BIG
      swap_xy: true
      mirror_x: false
      mirror_y: false
      bits_per_pixel: 16
      bus_i80_config:
        dc_gpio_num: 0                       # LCD RS (Command/Data Selection)
        wr_gpio_num: 47                      # LCD WR (Write Clock)
        data_gpio_nums: [9, 46, 3, 8, 18, 17, 16, 15]  # LCD DB0..DB7
        bus_width: 8
        max_transfer_bytes: 307200           # 480*320*2 (16bpp full screen)
        clk_src: LCD_CLK_SRC_PLL160M
        dma_burst_size: 64
      io_i80_config:
        cs_gpio_num: -1                      # No CS used for this parallel LCD
        pclk_hz: 10000000                    # 10 MHz as per ST7796 reference macro
        trans_queue_depth: 10
        lcd_cmd_bits: 8
        lcd_param_bits: 8
        dc_levels:
          dc_idle_level: 0
          dc_cmd_level: 0
          dc_dummy_level: 0
          dc_data_level: 1
        flags:
          cs_active_high: true
          swap_color_bytes: false
      lcd_panel_config:
        reset_gpio_num: -1                         # reset handled manually in setup_device.c
        rgb_ele_order: LCD_RGB_ELEMENT_ORDER_BGR
        data_endian: LCD_RGB_DATA_ENDIAN_BIG
        bits_per_pixel: 16
        flags:
          reset_active_high: false
        vendor_config: ""

  # Touch Panel (FT6336U over I2C)
  - name: lcd_touch
    chip: ft5x06
    type: lcd_touch_i2c
    version: default
    dependencies:
      esp_lcd_touch:
        version: "*"
        require: public
      espressif/esp_lcd_touch_ft5x06: "^1.0.7"
    config:
      io_i2c_config:
        dev_addr: [0x38]
        lcd_cmd_bits: 8
        scl_speed_hz: 400000
        flags:
          dc_low_on_data: false
          disable_control_phase: true
        peripherals:
          - name: i2c_master
      touch_config:
        x_max: 320
        y_max: 480
        rst_gpio_num: -1                          # reset handled manually in setup_device.c
        int_gpio_num: 7
        levels:
          reset: 0
          interrupt: 0
        flags:
          swap_xy: true
          mirror_x: false
          mirror_y: false

  # SD Card (SPI mode)
  - name: fs_sdcard
    type: fs_fat
    sub_type: spi
    version: default
    config:
      sub_config:
        cs_gpio_num: 41
        frequency: SDMMC_FREQ_DEFAULT
    peripherals:
      - name: spi_master

  # LCD Backlight
  - name: lcd_brightness
    type: ledc_ctrl
    version: default
    config:
      default_percent: 100
    peripherals:
      - name: ledc_backlight

  # CAN Bus (TWAI)
  - name: can_bus
    type: custom
    chip: twai
    version: default
    config:
      tx_gpio: 10
      rx_gpio: 11
      bitrate: 500000
      mode: normal
